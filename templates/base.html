<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>VIT-QMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">
                VIT-QMS
            </a>
    
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
    
            <div class="collapse navbar-collapse" id="navbarNav">
                {% if request.user.is_authenticated %}
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a href="{% url 'dashboard' %}" class="nav-link">
                            Dashboard
                        </a>
                    </li>
    
                    <li class="nav-item">
                        <a href="{% url 'quality:issue_list' %}" class="nav-link">
                            Quality Issues
                        </a>
                    </li>
    
                    <li class="nav-item">
                        <a href="{% url 'quality:my_issues' %}" class="nav-link">
                            My Issues
                        </a>
                    </li>
    
                    <li class="nav-item">
                        <a href="{% url 'changes:change_list' %}" class="nav-link">
                            Change Requests
                        </a>
                    </li>
    
                    <li class="nav-item">
                        <a href="{% url 'changes:my_changes' %}" class="nav-link">
                            My Changes
                        </a>
                    </li>
                </ul>
    
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a href="{% url 'profile' %}" class="nav-link">
                            {{ request.user.username }}
                        </a>
                    </li>
    
                    <li class="nav-item">
                        <a href="{% url 'logout' %}" class="nav-link text-warning">
                            Logout
                        </a>
                    </li>
                </ul>
                {% else %}
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a href="{% url 'login' %}" class="nav-link">
                            Login
                        </a>
                    </li>
    
                    <li class="nav-item">
                        <a href="{% url 'register' %}" class="nav-link">
                            Register
                        </a>
                    </li>
                </ul>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
